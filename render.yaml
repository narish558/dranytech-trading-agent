services:
  - type: web
    name: dranytech-trading-agent
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    plan: starter
    healthCheckPath: /status
    envVars:
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TESTNET
        value: "false"
      - key: PORT
        value: "10000"
